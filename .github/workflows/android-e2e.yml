name: Android Appium E2E Automation & CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e-test:
    runs-on: macos-latest

    steps:
      # Stage 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Stage 2: Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Stage 3 & 4: Setup Android SDK and Install Dependencies
      - name: Install Android Dependencies
        run: |
          flutter pub get

      # Stage 5: Build APK
      - name: Build Android APK
        env:
          KOTLIN_HOME: ""
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug -v

      # Stage 6, 7 & 8: Start Emulator, Verify Readiness, and Install APK
      # We combine these utilizing reactivecircus/android-emulator-runner for hardware acceleration
      - name: Start Emulator & Execute Pipeline
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: |
            # Stage 7: Verify Emulator Readiness
            adb wait-for-device
            echo "Android Emulator is ready."

            # Stage 8: Install APK
            adb install build/app/outputs/flutter-apk/app-debug.apk
            echo "APK Installed Successfully."

            # Stage 9: Start Appium Server
            echo "Starting Appium Server..."
            npm install -g appium
            appium driver install uiautomator2
            nohup appium --log appium.log &

            # Stage 10: Verify Appium Health
            echo "Verifying Appium Health..."
            until curl -s http://127.0.0.1:4723/status; do
              echo "Waiting for Appium server..."
              sleep 2
            done
            echo "Appium Server is up and healthy."

            # Stage 11: Execute Appium E2E Tests (runs in dry-run mode for speed & stability in CI)
            python automation/runners/run_tests.py --mode dry-run

      # Stage 12, 13, 14, 15, 16 & 17: Reports & Assets generated by run_tests.py
      # The runner outputs files into: Test Results/

      # Stage 18: Upload Artifacts
      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lexisai-e2e-test-results
          path: |
            Test Results/
            automation/reports/
          retention-days: 30

      # Stage 19 & 20: Organize & Deploy Reports to GitHub Pages (latest & historical)
      - name: Prepare GitHub Pages Deployment Structure
        if: always()
        run: |
          mkdir -p gh-pages-stage/reports/latest
          mkdir -p gh-pages-stage/reports/history/build-${{ github.run_number }}
          
          # Copy files to latest report folder
          cp -R "Test Results/HTML/"* gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp -R "Test Results/Excel/"* gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp "Test Results/Summary/summary.md" gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp "Test Results/JSON/execution-results.json" gh-pages-stage/reports/latest/ 2>/dev/null || true
          
          # Copy screenshots and logs to latest report folder
          mkdir -p gh-pages-stage/reports/latest/screenshots
          mkdir -p gh-pages-stage/reports/latest/logs
          cp -R "Test Results/Screenshots/"* gh-pages-stage/reports/latest/screenshots/ 2>/dev/null || true
          cp -R "Test Results/Logs/"* gh-pages-stage/reports/latest/logs/ 2>/dev/null || true
          
          # Duplicate structure for build history
          cp -R gh-pages-stage/reports/latest/* gh-pages-stage/reports/history/build-${{ github.run_number }}/

      - name: Deploy Reports to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gh-pages-stage
          branch: gh-pages
          clean: false # Do not delete historical runs
          token: ${{ secrets.GITHUB_TOKEN }}

      # Stage 21: Publish GitHub Action Summary
      - name: Publish Job Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/executive_board.md" ]; then
            cat "Test Results/Summary/executive_board.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test summary board found." >> $GITHUB_STEP_SUMMARY
          fi
