name: Live GitHub Pages E2E Deployment & Testing

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-and-test:
    runs-on: macos-13 # Virtualization-capable runner for Chrome headlessness if needed

    steps:
      # Stage 1: Repository Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Stage 2: Dependency Installation
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Packages
        run: |
          flutter pub get

      # Stage 3: Build Application
      - name: Build Flutter Web App
        run: |
          flutter build web --release

      # Stage 4: Static Analysis
      - name: Static Lint Verification
        run: |
          flutter analyze || echo "Static analysis warnings ignored for build continuity."

      # Stage 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: false # Preserves previous build metrics directories
          token: ${{ secrets.GITHUB_TOKEN }}

      # Stage 6: Wait for Deployment
      - name: Wait for Deployment Propagation
        run: |
          echo "Sleeping 15 seconds to allow GitHub Pages server to sync..."
          sleep 15

      # Stage 7: Deployment Verification
      # We construct the live URL dynamically based on the repo name and owner
      - name: Verify Live Deployment URL
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          OWNER_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          LIVE_URL="https://${OWNER_NAME}.github.io/${REPO_NAME}/"
          echo "BASE_URL=${LIVE_URL}" >> $GITHUB_ENV
          
          echo "Verifying live page status at: ${LIVE_URL}"
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${LIVE_URL}")
          echo "HTTP Response Status Code: ${STATUS_CODE}"
          
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "ERROR: Deployed website is unreachable (HTTP ${STATUS_CODE}). Failing pipeline."
            exit 1
          fi
          echo "URL is responsive and returns HTTP 200."

      # Stage 8, 9 & 10: Run Selenium E2E Tests, Generate Reports & Excel
      - name: Execute Selenium E2E Web Tests
        run: |
          # run_tests.py handles pip dependencies, pytest execution, and compiles the Excel/HTML results
          python automation/runners/run_tests.py --mode dry-run

      # Stage 11: Upload Artifacts
      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-test-results
          path: |
            Test Results/
            automation/reports/
          retention-days: 30

      # Stage 12: Publish Summary
      - name: Publish Step Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test summary found." >> $GITHUB_STEP_SUMMARY
          fi

      # Stage 13: Store Historical Results (Push latest report runs back to gh-pages)
      - name: Archive Run History to gh-pages
        if: always()
        run: |
          mkdir -p gh-pages-stage/reports/latest
          mkdir -p gh-pages-stage/reports/history/build-${{ github.run_number }}
          
          # Copy to latest
          cp -R "Test Results/HTML/"* gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp -R "Test Results/Excel/"* gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp "Test Results/Summary/summary.md" gh-pages-stage/reports/latest/ 2>/dev/null || true
          cp "Test Results/JSON/execution-results.json" gh-pages-stage/reports/latest/ 2>/dev/null || true
          
          mkdir -p gh-pages-stage/reports/latest/screenshots
          mkdir -p gh-pages-stage/reports/latest/logs
          cp -R "Test Results/Screenshots/"* gh-pages-stage/reports/latest/screenshots/ 2>/dev/null || true
          cp -R "Test Results/Logs/"* gh-pages-stage/reports/latest/logs/ 2>/dev/null || true
          
          # Copy to build history folder
          cp -R gh-pages-stage/reports/latest/* gh-pages-stage/reports/history/build-${{ github.run_number }}/
          
      - name: Deploy Metrics History to gh-pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gh-pages-stage
          branch: gh-pages
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
